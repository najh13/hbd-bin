<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HBD Bidin! ⛰️🎆</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #0b101a; 
            overflow: hidden; 
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        /* Background Gunung */
        #bg-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
            background: linear-gradient(to bottom, #0b101a 0%, #1a253a 100%);
        }
        .bg-layer {
            position: absolute;
            bottom: 0; left: 0;
            width: 200%;
            background-repeat: repeat-x;
            background-size: auto 100%;
            image-rendering: pixelated;
        }
        #layer-back { background-image: url('https://raw.githubusercontent.com/itinerantgames/pixel-parallax/master/mountain_back.png'); z-index: 2; height: 40vh; opacity: 0.3; animation: moveBg 100s linear infinite; }
        #layer-mid { background-image: url('https://raw.githubusercontent.com/itinerantgames/pixel-parallax/master/mountain_mid.png'); z-index: 3; height: 30vh; opacity: 0.5; animation: moveBg 60s linear infinite; }
        #layer-front { background-image: url('https://raw.githubusercontent.com/itinerantgames/pixel-parallax/master/mountain_front.png'); z-index: 4; height: 20vh; animation: moveBg 30s linear infinite; }

        @keyframes moveBg { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        canvas { position: absolute; top: 0; left: 0; }
        #pixel-canvas { z-index: 10; pointer-events: auto; }
        #fireworks-canvas { z-index: 5; pointer-events: none; }

        /* Overlay Awal */
        #overlay { z-index: 30; text-align: center; padding: 20px; }
        h1 { font-size: 0.7rem; margin-bottom: 30px; line-height: 1.8; text-shadow: 3px 3px #000; }
        button {
            padding: 15px 25px;
            font-family: 'Press Start 2P', cursive;
            background: #e67e22;
            border: 4px solid #ba6216;
            cursor: pointer;
            font-size: 0.8rem;
            color: white;
            box-shadow: 4px 4px 0px #000;
        }

        /* UI Kue */
        #ui-layer {
            position: absolute;
            bottom: 15%;
            z-index: 20;
            width: 100%;
            text-align: center;
            display: none;
        }
        .cake-container { font-size: 3rem; margin-bottom: 20px; position: relative; cursor: pointer; display: inline-block; }
        .flame { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { opacity: 0.8; transform: translateX(-50%) scale(1); } to { opacity: 1; transform: translateX(-50%) scale(1.3); } }

        /* Frame Foto */
        #photo-container {
            position: absolute;
            width: 70%;
            max-width: 300px;
            display: none;
            z-index: 25;
            border: 8px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            background: #fff;
            transform: rotate(-3deg);
            animation: appear 1s ease-out;
        }
        #photo-container img { width: 100%; height: auto; display: block; }
        @keyframes appear { from { transform: scale(0) rotate(10deg); opacity: 0; } to { transform: scale(1) rotate(-3deg); opacity: 1; } }

        .hbd-text {
            display: none;
            position: absolute;
            top: 10%;
            z-index: 26;
            color: #f1c40f;
            text-align: center;
            width: 100%;
            font-size: 0.9rem;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

    <div id="bg-container">
        <div class="bg-layer" id="layer-back"></div>
        <div class="bg-layer" id="layer-mid"></div>
        <div class="bg-layer" id="layer-front"></div>
    </div>
    
    <canvas id="fireworks-canvas"></canvas>
    <canvas id="pixel-canvas"></canvas>

    <div id="overlay">
        <h1>29 APRIL 2026...<br>MISI PENCARIAN BIDIN</h1>
        <button onclick="initSequence()">SAYA BIDIN</button>
    </div>

    <!-- Ganti dengan foto Bidin -->
    <div id="photo-container">
        <img src="foto_bidin.jpg" alt="HBD Bidin!">
    </div>
    
    <div class="hbd-text" id="hbd-text">HAPPY BIRTHDAY<br>BIDIN! 🎆</div>

    <div id="ui-layer">
        <div class="cake-container" onclick="blowCandle()">
            <span class="flame" id="lilin">🔥</span>
            🎂<br><span style="font-size: 0.8rem; text-shadow: 2px 2px #000;">BDN</span>
        </div>
    </div>

    <script>
        const mainCanvas = document.getElementById('pixel-canvas');
        const mCtx = mainCanvas.getContext('2d');
        const fwCanvas = document.getElementById('fireworks-canvas');
        const fCtx = fwCanvas.getContext('2d');

        let particles = [];
        let fireworks = [];
        let isBlown = false;
        let animationActive = false;
        const images = [];
        const imageSources = ['char1.png', 'char2.png', 'char3.png', 'char4.png', 'char5.png'];

        imageSources.forEach((src, idx) => {
            const img = new Image();
            img.src = src;
            img.onload = () => { images[idx] = img; };
        });

        function resize() {
            mainCanvas.width = fwCanvas.width = window.innerWidth;
            mainCanvas.height = fwCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, tx, ty, charIdx) {
                this.x = Math.random() * mainCanvas.width;
                this.y = Math.random() * mainCanvas.height;
                this.tx = tx; this.ty = ty;
                this.color = color;
                this.size = 3;
                this.vx = 0; this.vy = 0;
                this.charIdx = charIdx;
            }
            update() {
                if(!isBlown) {
                    let t = Date.now() * 0.008;
                    let bounce = Math.sin(t + (this.charIdx * 1.5)) * 15;
                    this.x += (this.tx - this.x) * 0.1;
                    this.y += ((this.ty + bounce) - this.y) * 0.1;
                } else {
                    this.x += this.vx; this.y += this.vy; this.vy += 0.25;
                }
            }
            draw() {
                mCtx.fillStyle = this.color;
                mCtx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        class Firework {
            constructor() {
                this.x = Math.random() * fwCanvas.width;
                this.y = fwCanvas.height;
                this.ty = Math.random() * (fwCanvas.height * 0.4);
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -(Math.random() * 10 + 10);
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.exploded = false;
                this.sparks = [];
            }
            update() {
                if (!this.exploded) {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.vy >= -1) this.explode();
                    this.vy += 0.15;
                } else {
                    this.sparks.forEach((s, i) => {
                        s.x += s.vx; s.y += s.vy;
                        s.vy += 0.1; s.alpha -= 0.01;
                        if (s.alpha <= 0) this.sparks.splice(i, 1);
                    });
                }
            }
            explode() {
                this.exploded = true;
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 2;
                    this.sparks.push({
                        x: this.x, y: this.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        alpha: 1
                    });
                }
            }
            draw() {
                if (!this.exploded) {
                    fCtx.fillStyle = this.color;
                    fCtx.fillRect(this.x, this.y, 3, 3);
                } else {
                    this.sparks.forEach(s => {
                        fCtx.globalAlpha = s.alpha;
                        fCtx.fillStyle = this.color;
                        fCtx.fillRect(s.x, s.y, 2, 2);
                    });
                    fCtx.globalAlpha = 1;
                }
            }
        }

        function initSequence() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';

            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            const slice = mainCanvas.width / 5;

            images.forEach((img, idx) => {
                if(!img) return;
                const scale = (slice * 0.8) / img.width;
                tempCanvas.width = img.width; tempCanvas.height = img.height;
                tCtx.drawImage(img, 0, 0);
                const data = tCtx.getImageData(0, 0, img.width, img.height).data;
                for (let y = 0; y < img.height; y += 6) {
                    for (let x = 0; x < img.width; x += 6) {
                        const i = (y * img.width + x) * 4;
                        if(data[i+3] > 128) {
                            particles.push(new Particle(
                                x, y, `rgb(${data[i]},${data[i+1]},${data[i+2]})`,
                                (slice * idx) + (slice/2) - (img.width*scale/2) + (x*scale),
                                (mainCanvas.height * 0.3) + (y*scale), idx
                            ));
                        }
                    }
                }
            });
            if(!animationActive) { animationActive = true; animate(); }
        }

        function blowCandle() {
            if(isBlown) return;
            isBlown = true;
            document.getElementById('lilin').style.display = 'none';
            particles.forEach(p => { p.vx = (Math.random() - 0.5) * 45; p.vy = (Math.random() - 0.8) * 45; });

            setTimeout(() => {
                particles = [];
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('photo-container').style.display = 'block';
                document.getElementById('hbd-text').style.display = 'block';
                // Mulai kembang api
                setInterval(() => { if(fireworks.length < 10) fireworks.push(new Firework()); }, 500);
            }, 1000);
        }

        function animate() {
            mCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            fCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
            
            particles.forEach(p => { p.update(); p.draw(); });
            fireworks.forEach((fw, i) => {
                fw.update(); fw.draw();
                if (fw.exploded && fw.sparks.length === 0) fireworks.splice(i, 1);
            });
            
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
